<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Fruta — Agrícola Guapa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1923;color:#e2e8f0;min-height:100vh}

/* ── Header estilo Despachos ── */
header{background:#0f1923;border-bottom:1px solid #1e2d3d;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:#22c55e;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
header h1{font-size:1.1rem;font-weight:700;color:#e2e8f0}
header h1 span{color:#64748b;font-size:.8rem;font-weight:400;margin-left:8px}
.upd{font-size:.72rem;color:#64748b;text-align:right}
.upd strong{display:block;color:#94a3b8;font-size:.82rem}

/* ── KPIs ── */
.kpis{display:flex;gap:10px;padding:14px 24px;flex-wrap:wrap}
.kpi{flex:1;min-width:130px;background:#1e2d3d;border:1px solid #2a3f55;border-radius:10px;padding:14px 16px}
.kpi .v{font-size:1.6rem;font-weight:800;line-height:1}
.kpi .l{font-size:.68rem;color:#64748b;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.kpi.urg .v{color:#ef4444}
.kpi.ok  .v{color:#22c55e}
.kpi.inf .v{color:#3b82f6}
.kpi.def .v{color:#e2e8f0}

/* ── Views ── */
.views{display:flex;gap:8px;padding:0 24px 12px;flex-wrap:wrap}
.vbtn{padding:7px 16px;border:1px solid #2a3f55;border-radius:7px;background:#1e2d3d;color:#94a3b8;font-size:.8rem;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s}
.vbtn.active{background:#22c55e;color:#0f1923;border-color:#22c55e}
.vbtn:hover:not(.active){background:#2a3f55;color:#e2e8f0}

/* ── Filters ── */
.bar{padding:0 24px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bar select{padding:6px 10px;border:1px solid #2a3f55;border-radius:6px;background:#1e2d3d;color:#e2e8f0;font-size:.78rem;cursor:pointer;font-family:inherit}
.bar select:focus{outline:none;border-color:#22c55e}
.breset{padding:6px 14px;background:transparent;color:#64748b;border:1px solid #2a3f55;border-radius:6px;font-size:.78rem;cursor:pointer;font-family:inherit}
.breset:hover{color:#e2e8f0;border-color:#94a3b8}

/* ── Legend ── */
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:0 24px 14px;align-items:center}
.leg{display:flex;align-items:center;gap:6px;font-size:.73rem;color:#94a3b8}
.leg-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,0.1)}

.content{padding:0 24px 32px}

/* ── COLORES MADUREZ — estilo Despachos ── */
/* VERDE */
.c-verde-bg   {background:#052e16}
.c-verde-hdr  {background:#166534;color:#fff}
.c-verde-txt  {color:#22c55e;font-weight:700}
.c-verde-badge{background:#22c55e;color:#052e16;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.c-verde-card {background:#14532d;border:1px solid #166534}
.c-verde-cell {background:#052e16;color:#22c55e;font-weight:700}
.pina-verde   {background-image:linear-gradient(rgba(5,46,22,0.82),rgba(5,46,22,0.82)),url('pina.png');background-size:70px auto;background-position:right bottom;background-repeat:no-repeat}

/* PINTONA - AMARILLO */
.c-pintona-bg   {background:#1c1a00}
.c-pintona-hdr  {background:#854d0e;color:#fff}
.c-pintona-txt  {color:#fbbf24;font-weight:700}
.c-pintona-badge{background:#fbbf24;color:#1c1a00;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.c-pintona-card {background:#292100;border:1px solid #854d0e}
.c-pintona-cell {background:#1c1a00;color:#fbbf24;font-weight:700}
.pina-pintona   {background-image:linear-gradient(rgba(28,26,0,0.80),rgba(28,26,0,0.80)),url('pina.png');background-size:70px auto;background-position:right bottom;background-repeat:no-repeat}

/* MADURA - NARANJA */
.c-madura-bg   {background:#1a0800}
.c-madura-hdr  {background:#c2410c;color:#fff}
.c-madura-txt  {color:#fb923c;font-weight:700}
.c-madura-badge{background:#fb923c;color:#1a0800;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.c-madura-card {background:#270e00;border:1px solid #c2410c}
.c-madura-cell {background:#1a0800;color:#fb923c;font-weight:700}
.pina-madura   {background-image:linear-gradient(rgba(26,8,0,0.78),rgba(26,8,0,0.78)),url('pina.png');background-size:70px auto;background-position:right bottom;background-repeat:no-repeat}

/* ── TARJETAS ── */
.v-tarjetas{display:flex;flex-direction:column;gap:14px}
.dia-block{background:#1e2d3d;border:1px solid #2a3f55;border-radius:12px;overflow:hidden}
.dia-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#162032;border-bottom:1px solid #2a3f55}
.dia-hdr h2{font-size:.9rem;font-weight:700;color:#e2e8f0}
.horas-critico{background:#7f1d1d;color:#fca5a5;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.horas-alto{background:#7c2d12;color:#fdba74;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.horas-medio{background:#78350f;color:#fcd34d;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.horas-ok{background:#14532d;color:#86efac;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.dia-kg{margin-left:auto;font-size:.8rem;color:#64748b}
.dia-kg strong{color:#94a3b8}

.mad-section{border-bottom:1px solid #2a3f55}
.mad-section:last-child{border-bottom:none}
.mad-hdr{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:.78rem}
.mad-hdr .mad-kg{margin-left:auto;font-size:.88rem;font-weight:700}

.tam-grid{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px 12px}
.tam-card{border-radius:8px;padding:10px 14px;min-width:120px;flex:1}
.tam-card .tam-name{font-size:.7rem;color:#94a3b8;margin-bottom:4px;font-weight:600}
.tam-card .tam-kg{font-size:1.1rem;font-weight:800;line-height:1.1}
.tam-card .tam-cal{font-size:.62rem;margin-top:4px;opacity:.75}
.tam-card .tam-sub{font-size:.65rem;color:#64748b;margin-top:2px}

/* ── TABLA ── */
.v-tabla{overflow-x:auto}
table.ctable{border-collapse:collapse;width:100%;background:#1e2d3d;border-radius:10px;overflow:hidden;font-size:.8rem;border:1px solid #2a3f55}
table.ctable th{background:#162032;color:#94a3b8;padding:10px 14px;text-align:center;font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid #2a3f55}
table.ctable th.left{text-align:left}
table.ctable td{padding:8px 12px;border-bottom:1px solid #1a2535;text-align:right;white-space:nowrap}
table.ctable td.left{text-align:left;color:#94a3b8}
table.ctable tr:hover td{background:#162032}
.tfoot-row td{background:#0f1923;color:#e2e8f0;font-weight:700;border-top:2px solid #2a3f55}
.mad-group-hdr td{font-weight:700;padding:6px 14px;font-size:.72rem;letter-spacing:.05em;text-transform:uppercase}

/* ── BODEGA ── */
.v-bodega{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.bod-card{background:#1e2d3d;border:1px solid #2a3f55;border-radius:10px;overflow:hidden}
.bod-top{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a3f55;background:#162032}
.bod-fecha{font-size:.82rem;font-weight:700;color:#e2e8f0}
.bod-horas{font-size:.67rem;padding:2px 8px;border-radius:12px;font-weight:700}
.bod-kg-total{margin-left:auto;font-size:.74rem;color:#64748b}
.bod-kg-total strong{color:#94a3b8}
.urg-wrap{padding:8px 14px}
.urg-bar{height:4px;border-radius:2px;background:#1a2535;overflow:hidden;margin-bottom:4px}
.urg-fill{height:100%;border-radius:2px}
.urg-txt{font-size:.65rem;font-weight:600}
.bod-items{padding:6px 14px 12px;display:flex;flex-direction:column;gap:5px}
.bod-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px}
.bod-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.bod-item-info{flex:1;font-size:.74rem;font-weight:600}
.bod-item-kg{font-size:.82rem;font-weight:800;color:#e2e8f0}

.empty{text-align:center;padding:48px;color:#64748b;font-size:.9rem}
@media(max-width:600px){.kpis,.bar,.views,.legend,.content{padding-left:12px;padding-right:12px}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🍍</div>
    <h1>Inventario de Fruta <span>Agrícola Guapa</span></h1>
  </div>
  <div class="upd"><strong id="ts">—</strong>Última actualización</div>
</header>

<div class="kpis">
  <div class="kpi urg"><div class="v" id="kUrg">—</div><div class="l">Criticas +48h</div></div>
  <div class="kpi def"><div class="v" id="kE">—</div><div class="l">Estibas en bodega</div></div>
  <div class="kpi ok" ><div class="v" id="kK">—</div><div class="l">Kg disponibles</div></div>
  <div class="kpi inf"><div class="v" id="kF">—</div><div class="l">Dias de cosecha</div></div>
</div>

<div class="views">
  <button class="vbtn active" onclick="setView('tarjetas')" id="btn-tarjetas">Tarjetas por dia</button>
  <button class="vbtn" onclick="setView('tabla')"    id="btn-tabla">Tabla coloreada</button>
  <button class="vbtn" onclick="setView('bodega')"   id="btn-bodega">Bodega + Urgencia</button>
</div>

<div class="bar">
  <select id="fMad">
    <option value="">Toda la madurez</option>
    <option value="verde">🟢 Verde (0 - 1.0)</option>
    <option value="pintona">🟠 Pintona (1.5 - 2.5)</option>
    <option value="madura">🟡 Madura (3.0 - 4.0)</option>
  </select>
  <select id="fCalibr">
    <option value="">Todos los calibres</option>
    <option value="0">0 · Verde</option>
    <option value="0.5">0.5 · Verde</option>
    <option value="1">1 · Verde</option>
    <option value="0,0 - 1,0">0.0-1.0 · Verde</option>
    <option value="1.5">1.5 · Pintona</option>
    <option value="2">2 · Pintona</option>
    <option value="2.5">2.5 · Pintona</option>
    <option value="1,5 - 2,5">1.5-2.5 · Pintona</option>
    <option value="3">3 · Madura</option>
    <option value="4">4 · Madura</option>
    <option value="3,0 - 4,0">3.0-4.0 · Madura</option>
  </select>
  <select id="fTam"><option value="">Todos los tamanos</option></select>
  <select id="fFec"><option value="">Todas las fechas</option></select>
  <button class="breset" onclick="reset()">↺ Limpiar</button>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#22c55e"></div><span>Verde — calibre 0 a 1.0</span></div>
  <div class="leg"><div class="leg-dot" style="background:#fbbf24"></div><span>Pintona — calibre 1.5 a 2.5</span></div>
  <div class="leg"><div class="leg-dot" style="background:#fb923c"></div><span>Madura — calibre 3.0 a 4.0 (vender primero)</span></div>
</div>

<div class="content">
  <div id="v-tarjetas" class="v-tarjetas"></div>
  <div id="v-tabla"    class="v-tabla"    style="display:none"></div>
  <div id="v-bodega"   class="v-bodega"   style="display:none"></div>
</div>

<script>
const TAM_NAMES={'PE1':'Grande','PE2':'Mediana','PE3':'Pequena','PE4':'Muy pequena','PEGUA':'Guapita','PEBAB':'Baby','PIND':'Industria','AD1':'AD Grande','AD2':'AD Mediana','AD3':'AD Pequena','PJUG':'Jugos'};

function getMadurez(c){
  const s=String(c).trim().replace(',','.');
  if(s.includes('-')&&!s.startsWith('-')){
    const parts=s.split('-').map(p=>parseFloat(p.trim()));
    const avg=(parts[0]+parts[parts.length-1])/2;
    if(avg<=1.0)return'verde';if(avg<=2.5)return'pintona';return'madura';
  }
  const v=parseFloat(s);
  if(isNaN(v))return'madura';
  if(v<=1.0)return'verde';if(v<=2.5)return'pintona';return'madura';
}

function getCalibreLabel(c){
  const s=String(c).trim();
  const map={'0':'Verde (0)','0.5':'Verde (0.5)','1':'Verde (1)','0,0 - 1,0':'Verde (0-1)','1.5':'Pintona (1.5)','2':'Pintona (2)','2.5':'Pintona (2.5)','1,5 - 2,5':'Pintona (1.5-2.5)','3':'Madura (3)','4':'Madura (4)','3,0 - 4,0':'Madura (3-4)'};
  return map[s]||s;
}

function getMadClasses(mad){
  const map={verde:{bg:'c-verde-bg',hdr:'c-verde-hdr',txt:'c-verde-txt',badge:'c-verde-badge',card:'c-verde-card',cell:'c-verde-cell',pina:'pina-verde',dot:'#22c55e',label:'VERDE',calib:'0 - 1.0'},pintona:{bg:'c-pintona-bg',hdr:'c-pintona-hdr',txt:'c-pintona-txt',badge:'c-pintona-badge',card:'c-pintona-card',cell:'c-pintona-cell',pina:'pina-pintona',dot:'#fbbf24',label:'PINTONA',calib:'1.5 - 2.5'},madura:{bg:'c-madura-bg',hdr:'c-madura-hdr',txt:'c-madura-txt',badge:'c-madura-badge',card:'c-madura-card',cell:'c-madura-cell',pina:'pina-madura',dot:'#fb923c',label:'MADURA',calib:'3.0 - 4.0'}};
  return map[mad]||map.madura;
}

function urgColor(h){return h>=72?'#ef4444':h>=48?'#f97316':h>=24?'#eab308':'#22c55e'}
function urgClass(h){return h>=72?'horas-critico':h>=48?'horas-alto':h>=24?'horas-medio':'horas-ok'}
function horasDesde(f){return Math.floor((new Date()-new Date(f+'T00:00:00'))/3600000)}
function horasLabel(h){const d=Math.floor(h/24),r=h%24;return d>0?d+'d '+r+'h':h+'h'}
function fmtF(f){if(!f)return'';const[y,m,d]=f.split('-');const M=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return parseInt(d)+' '+M[parseInt(m)]+' '+y}

let ALL=[],currentView='tarjetas';

async function load(){
  try{
    const r=await fetch('inventario.csv?'+Date.now());
    if(!r.ok)throw 0;
    ALL=parseCSV(await r.text());
    document.getElementById('ts').textContent=new Date().toLocaleString('es-CO',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }catch{ALL=demo();document.getElementById('ts').textContent='Datos de demostracion';}
  buildFilters();render();
}

function parseCSV(t){
  const lines=t.trim().split('\n');
  const hdr=lines[0].split(',').map(s=>s.trim().replace(/"/g,''));
  return lines.slice(1).map(l=>{const v=l.split(',').map(s=>s.trim().replace(/"/g,''));const o={};hdr.forEach((h,i)=>o[h]=v[i]||'');return o;}).filter(r=>r.ID&&parseFloat(r.KgDisponibles)>0);
}

function buildFilters(){
  const tams=[...new Set(ALL.map(r=>r.Calidad))].sort();
  const fechas=[...new Set(ALL.map(r=>r.Fecha))].sort();
  fillSel('fTam',tams,c=>(TAM_NAMES[c]||c)+' ('+c+')');
  fillSel('fFec',fechas,f=>fmtF(f)+' — '+horasLabel(horasDesde(f)));
  ['fMad','fCalibr','fTam','fFec'].forEach(id=>document.getElementById(id).onchange=render);
}
function fillSel(id,items,fn){const s=document.getElementById(id);items.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=fn(v);s.appendChild(o);});}
function reset(){['fMad','fCalibr','fTam','fFec'].forEach(id=>document.getElementById(id).value='');render();}
function filtered(){
  const m=document.getElementById('fMad').value,cal=document.getElementById('fCalibr').value,t=document.getElementById('fTam').value,f=document.getElementById('fFec').value;
  return ALL.filter(r=>(!m||getMadurez(r.Calibre)===m)&&(!cal||r.Calibre===cal)&&(!t||r.Calidad===t)&&(!f||r.Fecha===f));
}
function setView(v){currentView=v;['tarjetas','tabla','bodega'].forEach(x=>{document.getElementById('v-'+x).style.display=x===v?'':'none';document.getElementById('btn-'+x).classList.toggle('active',x===v);});render();}

function render(){
  const data=filtered();
  const kg=data.reduce((s,r)=>s+(parseFloat(r.KgDisponibles)||0),0);
  document.getElementById('kUrg').textContent=data.filter(r=>horasDesde(r.Fecha)>=48).length;
  document.getElementById('kE').textContent=data.length.toLocaleString('es-CO');
  document.getElementById('kK').textContent=Math.round(kg).toLocaleString('es-CO')+' kg';
  document.getElementById('kF').textContent=[...new Set(data.map(r=>r.Fecha))].length;
  if(currentView==='tarjetas')renderTarjetas(data);
  if(currentView==='tabla')renderTabla(data);
  if(currentView==='bodega')renderBodega(data);
}

function renderTarjetas(data){
  const el=document.getElementById('v-tarjetas');
  if(!data.length){el.innerHTML='<div class="empty">Sin estibas disponibles.</div>';return;}
  const fechas=[...new Set(data.map(r=>r.Fecha))].sort();
  let html='';
  fechas.forEach(fecha=>{
    const h=horasDesde(fecha),bloque=data.filter(r=>r.Fecha===fecha);
    const kgB=bloque.reduce((s,r)=>s+(parseFloat(r.KgDisponibles)||0),0);
    html+=`<div class="dia-block"><div class="dia-hdr">
      <span class="${urgClass(h)}">${horasLabel(h)} en bodega</span>
      <h2>${fmtF(fecha)}</h2>
      <div class="dia-kg">Total: <strong>${Math.round(kgB).toLocaleString('es-CO')} kg</strong></div>
    </div>`;
    ['madura','pintona','verde'].forEach(mad=>{
      const filas=bloque.filter(r=>getMadurez(r.Calibre)===mad);
      if(!filas.length)return;
      const C=getMadClasses(mad);
      const kgM=filas.reduce((s,r)=>s+(parseFloat(r.KgDisponibles)||0),0);
      html+=`<div class="mad-section"><div class="mad-hdr ${C.hdr} ${C.pina}">
        <span class="${C.badge}">${C.label}</span>
        <span style="font-size:.73rem;opacity:.8">Calibre ${C.calib}</span>
        <span class="mad-kg ${C.txt}">${Math.round(kgM).toLocaleString('es-CO')} kg</span>
      </div><div class="tam-grid ${C.bg}">`;
      const tams=[...new Set(filas.map(r=>r.Calidad))].sort();
      tams.forEach(tam=>{
        const ft=filas.filter(r=>r.Calidad===tam);
        const kgT=ft.reduce((s,r)=>s+(parseFloat(r.KgDisponibles)||0),0);
        const calibres=[...new Set(ft.map(r=>r.Calibre))].sort((a,b)=>parseFloat(a)-parseFloat(b));
        const calStr=calibres.map(c=>getCalibreLabel(c)+': '+Math.round(ft.filter(r=>r.Calibre===c).reduce((s,r)=>s+(parseFloat(r.KgDisponibles)||0),0)).toLocaleString('es-CO')+' kg').join(' · ');
        html+=`<div class="tam-card ${C.card}">
          <div class="tam-name">${TAM_NAMES[tam]||tam} (${tam})</div>
          <div class="tam-kg ${C.txt}">${Math.round(kgT).toLocaleString('es-CO')} kg</div>
          <div class="tam-cal ${C.txt}">${calStr}</div>
          <div class="tam-sub">${ft.length} estiba${ft.length>1?'s':''}</div>
        </div>`;
      });
      html+=`</div></div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

function renderTabla(data){
  const el=document.getElementById('v-tabla');
  if(!data.length){el.innerHTML='<div class="empty">Sin estibas disponibles.</div>';return;}
  const fechas=[...new Set(data.map(r=>r.Fecha))].sort();
  const tams=[...new Set(data.map(r=>r.Calidad))].sort();
  const agg={};
  data.forEach(r=>{const mad=getMadurez(r.Calibre);if(!agg[r.Fecha])agg[r.Fecha]={};if(!agg[r.Fecha][mad])agg[r.Fecha][mad]={};agg[r.Fecha][mad][r.Calidad]=(agg[r.Fecha][mad][r.Calidad]||0)+(parseFloat(r.KgDisponibles)||0);});
  let html='<table class="ctable"><thead><tr><th class="left">Madurez / Tamano</th>';
  fechas.forEach(f=>{const h=horasDesde(f);html+=`<th>${fmtF(f)}<br><small style="color:${urgColor(h)}">${horasLabel(h)}</small></th>`;});
  html+='<th>Total kg</th></tr></thead><tbody>';
  ['madura','pintona','verde'].forEach(mad=>{
    const C=getMadClasses(mad);
    const bgHdr=mad==='verde'?'#166534':mad==='pintona'?'#9a3412':'#92400e';
    html+=`<tr class="mad-group-hdr"><td class="left" colspan="${fechas.length+2}" style="background:${bgHdr};color:#fff">${C.label} — calibre ${C.calib}</td></tr>`;
    tams.forEach(tam=>{
      let total=0,hasData=false;
      let row=`<tr><td class="left" style="padding-left:20px">${TAM_NAMES[tam]||tam} (${tam})</td>`;
      fechas.forEach(f=>{
        const kg=agg[f]?.[mad]?.[tam]||0;total+=kg;
        if(kg>0){hasData=true;row+=`<td class="${C.cell}">${Math.round(kg).toLocaleString('es-CO')}</td>`;}
        else row+=`<td style="color:#2a3f55">—</td>`;
      });
      row+=`<td class="${C.txt}">${total>0?Math.round(total).toLocaleString('es-CO'):'—'}</td></tr>`;
      if(hasData)html+=row;
    });
  });
  let grand=0;
  html+='<tr class="tfoot-row"><td class="left">TOTAL GENERAL</td>';
  fechas.forEach(f=>{const kg=Object.values(agg[f]||{}).reduce((s,m)=>s+Object.values(m).reduce((a,b)=>a+b,0),0);grand+=kg;html+=`<td>${Math.round(kg).toLocaleString('es-CO')}</td>`;});
  html+=`<td>${Math.round(grand).toLocaleString('es-CO')}</td></tr></tbody></table>`;
  el.innerHTML=html;
}

function renderBodega(data){
  const el=document.getElementById('v-bodega');
  if(!data.length){el.innerHTML='<div class="empty">Sin estibas disponibles.</div>';return;}
  const fechas=[...new Set(data.map(r=>r.Fecha))].sort();
  const maxH=Math.max(...fechas.map(f=>horasDesde(f)));
  let html='';
  fechas.forEach(fecha=>{
    const h=horasDesde(fecha),bloque=data.filter(r=>r.Fecha===fecha);
    const kgT=bloque.reduce((s,r)=>s+(parseFloat(r.KgDisponibles)||0),0);
    const pct=Math.min(100,Math.round((h/Math.max(maxH,1))*100));
    html+=`<div class="bod-card"><div class="bod-top">
      <div class="bod-fecha">${fmtF(fecha)}</div>
      <span class="bod-horas ${urgClass(h)}">${horasLabel(h)}</span>
      <div class="bod-kg-total">Total: <strong>${Math.round(kgT).toLocaleString('es-CO')} kg</strong></div>
    </div>
    <div class="urg-wrap">
      <div class="urg-bar"><div class="urg-fill" style="width:${pct}%;background:${urgColor(h)}"></div></div>
      <div class="urg-txt" style="color:${urgColor(h)}">${h}h en bodega — ${pct}% urgencia</div>
    </div><div class="bod-items">`;
    ['madura','pintona','verde'].forEach(mad=>{
      const fm=bloque.filter(r=>getMadurez(r.Calibre)===mad);
      if(!fm.length)return;
      const C=getMadClasses(mad);
      const tams=[...new Set(fm.map(r=>r.Calidad))].sort();
      tams.forEach(tam=>{
        const ft=fm.filter(r=>r.Calidad===tam);
        const kg=ft.reduce((s,r)=>s+(parseFloat(r.KgDisponibles)||0),0);
        const calibres=[...new Set(ft.map(r=>r.Calibre))].sort((a,b)=>parseFloat(a)-parseFloat(b));
        html+=`<div class="bod-item" style="background:${mad==='verde'?'#052e16':mad==='pintona'?'#431407':'#422006'}">
          <div class="bod-dot" style="background:${C.dot}"></div>
          <div class="bod-item-info" style="color:${C.dot}">
            <div>${C.label} · ${TAM_NAMES[tam]||tam}</div>
            <div style="font-size:.62rem;opacity:.7">${calibres.map(c=>getCalibreLabel(c)).join(', ')}</div>
          </div>
          <div class="bod-item-kg">${Math.round(kg).toLocaleString('es-CO')} kg</div>
        </div>`;
      });
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}
