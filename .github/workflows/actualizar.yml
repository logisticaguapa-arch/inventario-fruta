name: Actualizar Inventario

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Descargar y procesar Excel
        run: |
          python3 << 'EOF'
          import requests, openpyxl, io

          url = "https://agricolaguapa-my.sharepoint.com/:x:/g/personal/coordinador_logistico_guapa_com_co/IQDQfo1oimGITIutSnziZXTmAZuo0_tcGIcZvShC86nTMFg?download=1"
          r = requests.get(url, allow_redirects=True)
          wb = openpyxl.load_workbook(io.BytesIO(r.content), data_only=True)
          ws = wb["Inventario"]

          csv = "ID,Fecha,Calidad,Nombre,Calibre,KgDisponibles\n"
          for row in ws.iter_rows(min_row=2, values_only=True):
              if not row[0]: continue
              fecha = str(row[1])[:10] if row[1] else ""
              cal   = str(row[2] or "")
              nom   = str(row[3] or "").replace(",", " ")
              calib = str(row[4] or "").replace(",", ".")
              kg    = str(row[5] or 0)
              csv  += f"{row[0]},{fecha},{cal},{nom},{calib},{kg}\n"

          with open("inventario.csv", "w", encoding="utf-8") as f:
              f.write(csv)
          print("CSV generado correctamente")
          EOF

      - name: Subir CSV a GitHub
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add inventario.csv
          git diff --staged --quiet || git commit -m "Inventario actualizado $(date +'%Y-%m-%d %H:%M')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/logisticaguapa-arch/inventario-fruta.git
