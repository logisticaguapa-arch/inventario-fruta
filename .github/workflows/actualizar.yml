name: Actualizar Inventario

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Descargar y procesar Excel
        run: |
          python3 << 'EOF'
          import requests, openpyxl, io

          url = "https://agricolaguapa-my.sharepoint.com/:x:/g/personal/coordinador_logistico_guapa_com_co/IQDQfo1oimGITIutSnziZXTmAZuo0_tcGIcZvShC86nTMFg?download=1"
          r = requests.get(url, allow_redirects=True, timeout=30)
          print(f"Status: {r.status_code}, Tamaño: {len(r.content)} bytes")
          wb = openpyxl.load_workbook(io.BytesIO(r.content), data_only=True)

          # Leer col B (Bin) de Proceso para cruzar con ID
          ws_proc = wb["Proceso"]
          bin_map = {}
          for row in ws_proc.iter_rows(min_row=2, values_only=True):
              id_val  = row[0]   # Col A - ID
              bin_val = row[1]   # Col B - Bin
              if id_val:
                  bin_map[str(id_val).strip()] = str(bin_val or "").strip()

          print(f"IDs en Proceso: {len(bin_map)}")

          # Leer hoja Inventario
          ws_inv = wb["Inventario"]
          csv = "ID,Bin,Fecha,Calidad,Nombre,Calibre,KgDisponibles\n"
          for row in ws_inv.iter_rows(min_row=2, values_only=True):
              if not row[0]: continue
              id_val  = str(row[0]).strip()
              bin_val = bin_map.get(id_val, "")
              fecha   = str(row[1])[:10] if row[1] else ""
              calidad = str(row[2] or "")
              nombre  = str(row[3] or "").replace(",", " ")
              calibre = str(row[4] or "").replace(",", ".")
              kg      = str(row[5] or 0)
              csv += f"{id_val},{bin_val},{fecha},{calidad},{nombre},{calibre},{kg}\n"

          with open("inventario.csv", "w", encoding="utf-8") as f:
              f.write(csv)
          print(f"CSV generado: {csv.count(chr(10))-1} registros")
          EOF

      - name: Subir CSV a GitHub
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add inventario.csv
          git diff --staged --quiet || git commit -m "Inventario actualizado $(date +'%Y-%m-%d %H:%M')"
          git push origin main --force
          git diff --staged --quiet || git commit -m "Inventario actualizado $(date +'%Y-%m-%d %H:%M')"
          git push origin main --force
